<aside class="sidebar" aria-label="KidWay navigation">
  <a class="brand" routerLink="/app/home" (click)="sidebarState.closeMobile()" aria-label="KidWay home">
    <img src="assets/images/kidway-shield.png" alt="KidWay logo">
    <span>
      <strong>{{ 'app.name' | translate }}</strong>
      <small>{{ 'app.tagline' | translate }}</small>
    </span>
  </a>

  <p class="section-label">{{ 'layout.coreModules' | translate }}</p>

  <nav class="nav-list">
    @for (item of navigation.items; track item.route) {
      <a [routerLink]="item.route" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: false }" (click)="sidebarState.closeMobile()">
        <mat-icon aria-hidden="true">{{ item.icon }}</mat-icon>
        <span>{{ item.labelKey | translate }}</span>
      </a>
    }
  </nav>

  <div class="role-card">
    <small>{{ 'layout.rolePreview' | translate }}</small>
    <strong>Company Admin</strong>
  </div>
</aside>
